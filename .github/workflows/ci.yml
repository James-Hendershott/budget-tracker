name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # postinstall runs `prisma generate`, which only needs the schema
      # file (no live database) — safe to run before any DB is up.
      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

      - run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          AUTH_SECRET: ci-only-placeholder-secret-not-used-anywhere-real
          NEXTAUTH_URL: http://localhost:3000
